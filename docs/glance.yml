pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: search
            search-engine: duckduckgo

          - type: bookmarks
            groups:
              - title: Self-Hosted
                links:
                  - title: RVUOS
                    url: https://www.rvuos.io
                    icon: mdi:web
                  - title: Servrar Bot
                    url: https://bot.servrar.net
                    icon: mdi:robot-outline
                  - title: Email Tasks
                    url: https://tasks.servrar.net
                    icon: mdi:email-check-outline
                  - title: Tududi
                    url: https://tudu.servrar.net
                    icon: mdi:checkbox-marked-outline

          - type: monitor
            cache: 1m
            title: Service Status
            sites:
              - title: RVUOS
                url: https://www.rvuos.io
              - title: Servrar Bot
                url: https://bot.servrar.net
              - title: Email Tasks
                url: https://tasks.servrar.net
              - title: Tududi
                url: https://tudu.servrar.net

          - type: calendar
            first-day-of-week: sunday

      - size: full
        widgets:
          - type: group
            widgets:
              - type: hacker-news
              - type: lobsters

          - type: group
            widgets:
              - type: reddit
                subreddit: selfhosted
                show-thumbnails: true
              - type: reddit
                subreddit: technology
                show-thumbnails: true

      - size: small
        widgets:
          - type: weather
            location: Bend, Oregon, United States
            units: imperial
            hour-format: 12h

          - type: markets
            markets:
              - symbol: SPY
                name: S&P 500
              - symbol: BTC-USD
                name: Bitcoin
              - symbol: NVDA
                name: NVIDIA

          - type: rss
            limit: 10
            collapse-after: 3
            cache: 12h
            feeds:
              - url: https://selfh.st/rss/
                title: selfh.st
                limit: 4
